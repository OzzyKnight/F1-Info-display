name: Build ESP-IDF ESP32-S3

on:
  push:
    branches:
      - main
    paths:
      - 'main/**'
      - 'components/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build ESP-IDF Project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: 'v5.3' # Change to match your local ESP-IDF version
          target: 'esp32s3'
          path: '.'

      - name: Upload Build Binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-binaries
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
